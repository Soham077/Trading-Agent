version: "3.9"
services:
  backtest:
    build: ..
    volumes:
      - ../logs:/app/logs
      - ../models:/app/models
    command: ["python", "main.py", "--mode", "backtest", "--config", "config.example.yaml"]
  paper:
    build: ..
    environment:
      - BINANCE_API_KEY=${BINANCE_API_KEY}
      - BINANCE_API_SECRET=${BINANCE_API_SECRET}
    volumes:
      - ../logs:/app/logs
    command: ["python", "main.py", "--mode", "paper", "--config", "config.example.yaml"]